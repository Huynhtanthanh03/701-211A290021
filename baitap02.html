<main>

<h2>Đăng ký tài khoản</h2>

<form onsubmit="dangKy(event)">

<label>Họ và tên</label>
<input
type="text"
id="name"
placeholder="Nhập họ tên">

<label>Email</label>
<input
type="email"
id="email"
placeholder="Nhập email">

<label>Mật khẩu</label>
<input
type="password"
id="password"
placeholder="Nhập mật khẩu">

<label>
<input
type="checkbox"
id="agree">
Đồng ý điều khoản
</label>

<br><br>

<button type="submit">
Đăng ký
</button>

</form>
